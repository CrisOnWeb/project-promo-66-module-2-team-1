<section class="design js_designSection">
  <div class="fill__preview-card js_fillPreview" id="preview1">
    <load src="partials/preview.html" />
  </div>
  <fieldset class="design__fieldset">
    <legend class="design__text">Elige el diseño de tu tarjeta:</legend>
    <div class="design__container">
      <div class="custom-select js_customSelect">
        <div class="design__selected js_selectedDesign"></div>

        <div class="design__options js_optionsDesign">
          <div
            class="option palette-default js_designDefault js_option"
            data-value="0"
            id="palette0"
          >
            <span></span>
          </div>
          <div
            class="option palette-pastel js_option"
            data-value="1"
            id="palette1"
          >
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div
            class="option palette-electric js_option"
            data-value="2"
            id="palette2"
          >
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div
            class="option palette-neutral js_option"
            data-value="3"
            id="palette3"
          >
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
      <input
        type="hidden"
        name="design_hidden"
        class="design_hidden js_hiddenDesign"
        id="design_hidden"
      />
    </div>
    <p class="design__note">
      Pulsa en la tarjeta para volver a la de por defecto
    </p>
    <div class="design__field">
      <label class="design__label" for="image">Añadir imagen</label>
      <input
        class="design__input design__input--file js_previewImg js__profile-upload-btn"
        id="image"
        type="file"
        name="imagen"
        accept="image/*"
      />
    </div>
  </fieldset>
</section>
