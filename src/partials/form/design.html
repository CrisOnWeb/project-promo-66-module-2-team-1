<div class="design-page">
  <fieldset class="design_fieldset">
    <legend class="design_text">Elige el diseño de tu tarjeta:</legend>
    <div class="custom-select js_customSelect">
      <div class="design_selected js_selectedDesign"></div>

      <div class="design_options js_optionsDesign">
        <div
          class="option palette-default js_designDefault js_option"
          data-value="0"
          id="palette0"
        >
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div
          class="option palette-pastel js_option"
          data-value="1"
          id="palette1"
        >
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div
          class="option palette-electric js_option"
          data-value="2"
          id="palette2"
        >
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div
          class="option palette-neutral js_option"
          data-value="3"
          id="palette3"
        >
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
    <input
      type="hidden"
      name="design_hidden"
      class="design_hidden js_hiddenDesign"
      id="design_hidden"
    />
  </fieldset>
  <div class="fill__field">
    <label class="fill__label" for="image">Añadir imagen</label>
    <input
      class="fill__input fill__input--file"
      id="image"
      type="file"
      name="imagen"
      accept="image/*"
      required
    />
  </div>
</div>
