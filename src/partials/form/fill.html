<section class="fill" aria-labelledby="fill-title">
    <header class="fill__header">
        <h2 class="fill__title" id="fill-title">Rellena los datos</h2>
    </header>

    <fieldset class="fill__fieldset">
        <legend class="fill__legend">Datos del perro</legend>

        <label class="fill__field">
            <span class="fill__label">Añadir imagen</span>
            <input class="fill__input fill__input--file" type="file" name="imagen" accept="image/*" required />
        </label>

        <label class="fill__field">
            <span class="fill__label">Nombre</span>
            <input class="fill__input" type="text" name="nombre" autocomplete="given-name" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__label">Apellido</span>
            <input class="fill__input" type="text" name="apellido" autocomplete="family-name" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__label">Descripción</span>
            <input class="fill__input" type="text" name="descripcion" placeholder="Descripción" autocomplete="off" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__label">Edad</span>
            <input class="fill__input" type="number" name="edad" min="0" max="20" step="1" inputmode="numeric" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__label">Peso</span>
            <input class="fill__input" type="number" name="peso" min="0" step="0.1" inputmode="decimal" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__label">Raza</span>
            <input class="fill__input" type="text" name="raza" autocomplete="off" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__label">Color</span>
            <input class="fill__input" type="text" name="color" autocomplete="off" required />
        </label>

         <label class="fill__field">
            <span class="fill__label">Instagram</span>
            <input class="fill__input" type="url" name="instagram" autocomplete="url" required />
        </label>
    </fieldset>
    
    <p class="fill__note">Todos los campos son obligatorios.</p>
    <button class="fill__button" type="submit">Enviar</button>
</section>
