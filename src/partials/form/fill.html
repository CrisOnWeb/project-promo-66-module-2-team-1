<section class="fill" aria-labelledby="fill-title">
    <header class="fill__header">
        <h2 class="fill__title" id="fill-title">Rellena los datos</h2>
        <button class="fill__buton" type="submit">Enviar</button>
    </header>

    <fieldset class="fill_fieldset">
        <legend class="fill__is-hidden">Datos del perro</legend>

        <label class="fill__field fill__field--file">
            <span class="fill__field-text">Añadir imagen</span>
            <input class="fill__file-input" type="file" name="imagen" accept="image/*" required />
        </label>

        <label class="fill__field">
            <span class="fill__is-hidden">Nombre</span>
            <input class="fill__input" type="text" name="nombre" placeholder="Nombre" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__is-hidden">Apellido</span>
            <input class="fill__input" type="text" name="apellido" placeholder="Apellido" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__is-hidden">Descripción</span>
            <input class="fill__input" type="text" name="descripcion" placeholder="Descripción" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__is-hidden">Edad</span>
            <input class="fill__input" type="number" name="edad" placeholder="Edad" min="0" max="20" step="1" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__is-hidden">Peso</span>
            <input class="fill__input" type="number" name="peso" placeholder="Peso" min="0" step="0.1" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__is-hidden">Raza</span>
            <input class="fill__input" type="text" name="raza" placeholder="Raza" required />
        </label>
        
        <label class="fill__field">
            <span class="fill__is-hidden">Color</span>
            <input class="fill__input" type="text" name="color" placeholder="Color" required />
        </label>

         <label class="fill__field">
            <span class="fill__is-hidden">Instagram</span>
            <input class="fill__input" type="url" name="instagram" placeholder="Instagram perruno" required />
        </label>

        <p class="fill__note">Todos los campos obligatorios</p>
    </fieldset>
</section>
